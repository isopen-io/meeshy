name: Meeshy
options:
  bundleIdPrefix: me.meeshy
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en

settings:
  SWIFT_VERSION: "6.0"
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"
  # NOTE: PRODUCT_NAME is intentionally NOT set globally. As a project-wide
  # setting it propagates to every target, so MeeshyWidgets and
  # MeeshyNotificationExtension would both build as "Meeshy.appex" and Xcode
  # fails with "Multiple commands produce …/Meeshy.appex". Each target's
  # PRODUCT_NAME defaults to $(TARGET_NAME), which is correct
  # (Meeshy.app, MeeshyWidgets.appex, MeeshyNotificationExtension.appex).
  TARGETED_DEVICE_FAMILY: "1,2"
  # Swift 6.2 Approachable Concurrency (WWDC25).
  # - SWIFT_APPROACHABLE_CONCURRENCY umbrella flag (includes Sendable
  #   inference from captures, global-actor usability, etc.)
  # - SWIFT_DEFAULT_ACTOR_ISOLATION = MainActor (SE-0466): UI-centric code
  #   is main-actor by default, background work must be explicit with
  #   @concurrent / nonisolated. This shifts data races from runtime
  #   crashes (background/foreground transitions) to compile errors.
  # - NonisolatedNonsendingByDefault (SE-0461): async functions inherit
  #   the caller's actor unless annotated @concurrent.
  SWIFT_APPROACHABLE_CONCURRENCY: "YES"
  SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
  SWIFT_UPCOMING_FEATURE_NONISOLATED_NONSENDING_BY_DEFAULT: "YES"

  # Apple-generic versioning — REQUIS par fastlane (get_build_number /
  # increment_build_number / increment_version_number, qui appellent agvtool).
  # Le projet n'avait AUCUN système de versioning configuré dans le pbxproj →
  # `agvtool what-version -terse` sortait en code 6 ("setup your project
  # properly") au lancement de la lane `beta`/`release`. Les valeurs miroir
  # Configuration/*.xcconfig (non câblés au projet). Les lanes prennent
  # max(version locale, dernier build TestFlight) + 1, donc le "1" littéral
  # n'est qu'un plancher — le build réel reste strictement croissant.
  VERSIONING_SYSTEM: apple-generic
  CURRENT_PROJECT_VERSION: "1"
  MARKETING_VERSION: "1.0.0"

  # Équipe de signature (Automatic). Indispensable pour `meeshy.sh device`
  # (déploiement sur appareil réel) : sans DEVELOPMENT_TEAM, la signature
  # automatique ne peut pas résoudre le profil → BUILD/sign FAILED. La valeur
  # ne vivait QUE dans le pbxproj committé (résidu d'un réglage Xcode local) →
  # perdue à chaque `xcodegen generate`. Désormais source de vérité ici.
  # Sans impact CI (build simulateur = pas de signature device requise).
  DEVELOPMENT_TEAM: D72UK7R5RE

# Swift package graph. Only two packages are referenced directly by the
# Xcode project: Firebase (remote) and the local MeeshySDK. GRDB, Socket.IO,
# WebRTC and WhisperKit are transitive dependencies of MeeshySDK
# (declared in packages/MeeshySDK/Package.swift) and are imported through it,
# so they must NOT be listed here. Mirrors the package refs that were in the
# committed pbxproj before XcodeGen owned generation.
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.12.1
  MeeshySDK:
    path: ../../packages/MeeshySDK

targets:
  Meeshy:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Meeshy
        excludes:
          - "**/*.md"
    settings:
      INFOPLIST_FILE: Meeshy/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: me.meeshy.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      ENABLE_PREVIEWS: YES
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: Meeshy/Meeshy.entitlements
    dependencies:
      - target: MeeshyWidgets
      - target: MeeshyNotificationExtension
      - target: MeeshyShareExtension
      # MeeshyShareExtension is intentionally NOT embedded yet — see its target
      # definition below. Embedding it makes `fastlane build_production` fail the
      # distribution archive ("No profiles for 'me.meeshy.app.share-extension'")
      # because that bundle id is not registered for signing. Re-add this line
      # only after the App-ID + App-Group + App-Store profile exist (and the id
      # is added to Fastfile/Matchfile `app_identifier`).
      - package: MeeshySDK
        product: MeeshySDK
      - package: MeeshySDK
        product: MeeshyUI
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebasePerformance
    # Target-level scheme so `xcodegen generate` emits a shared "Meeshy"
    # scheme wired to run the MeeshyTests bundle. CI invokes this via
    # `xcodebuild -scheme Meeshy -only-testing:MeeshyTests`. A top-level
    # `scheme:` key is NOT valid XcodeGen and is silently ignored, which
    # would drop the shared scheme on regeneration.
    scheme:
      testTargets:
        - MeeshyTests

  MeeshyWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MeeshyWidgets
    dependencies:
      - package: MeeshySDK
        product: MeeshySDK
    settings:
      INFOPLIST_FILE: MeeshyWidgets/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: me.meeshy.app.widgets
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: MeeshyWidgets/MeeshyWidgets.entitlements
      # SPM explicit module builds fail to resolve GRDB's C target (CSQLite)
      # for this app-extension target ("Unable to find module dependency:
      # 'CSQLite'") even though the same MeeshySDK product builds fine in the
      # main app target — a known Xcode/SPM limitation with C-language SPM
      # targets linked into extensions under explicit module builds.
      SWIFT_ENABLE_EXPLICIT_MODULES: NO

  MeeshyNotificationExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MeeshyNotificationExtension
    settings:
      INFOPLIST_FILE: MeeshyNotificationExtension/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: me.meeshy.app.notification-service
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: MeeshyNotificationExtension/MeeshyNotificationExtension.entitlements
    dependencies:
      # NotificationService.swift imports MeeshySDK (and GRDB transitively).
      - package: MeeshySDK
        product: MeeshySDK

  # Share Extension — "Share to Meeshy" depuis d'autres apps. ShareViewController
  # est auto-contenu (frameworks système + container App Group group.me.meeshy.apps) ;
  # aucune dépendance SDK. Recâblé 2026-06-24 (présent sur disque mais absent de
  # project.yml → jamais compilé). Info.plist : NSExtensionPrincipalClass
  # (ShareViewController programmatique, pas de storyboard).
  #
  # SIGNING PENDING — ce target est DÉFINI mais PAS embarqué dans l'app (retiré
  # des `dependencies` de Meeshy ci-dessus). Le bundle id
  # `me.meeshy.app.share-extension` n'est PAS enregistré côté Apple Developer :
  # `fastlane build_production` échouait l'archive de distribution
  # ("No profiles for 'me.meeshy.app.share-extension' were found"). Pour finir le
  # recâblage et l'expédier : (1) enregistrer l'App ID + l'App Group
  # `group.me.meeshy.apps` dans le portail, (2) ajouter le bundle id à
  # `app_identifier` dans fastlane/Fastfile (lanes `match`) + fastlane/Matchfile,
  # (3) `bundle exec fastlane match appstore`, (4) remettre `- target:
  # MeeshyShareExtension` dans les dependencies de l'app. Tant que ces étapes ne
  # sont pas faites, le target reste compilable isolément mais hors archive.
  MeeshyShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MeeshyShareExtension
    settings:
      INFOPLIST_FILE: MeeshyShareExtension/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: me.meeshy.app.share-extension
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: MeeshyShareExtension/MeeshyShareExtension.entitlements

  # P4.3 step 1 — MeeshyTests is the unit-test bundle that previously was
  # only declared inside Meeshy.xcodeproj/project.pbxproj (via 20+ Ruby
  # `add_*.rb` scripts maintaining explicit file references). Declaring
  # it here lets `xcodegen generate` produce a canonical pbxproj — the
  # next step is to delete the Ruby scripts once the regenerated project
  # builds on macOS.
  #
  # `dependencies: [target: Meeshy]` makes the test bundle link against
  # the host app, which is required for `@testable import Meeshy` and for
  # the `TEST_HOST` setting that xctest needs at runtime. XcodeGen wires
  # the host-app build setting automatically when the dependency target
  # is of type `application`.
  MeeshyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: MeeshyTests
        excludes:
          - "**/*.md"
          # XCUITest — instantiates XCUIApplication() and drives the running
          # app. It cannot live in this hosted unit-test bundle: there is no
          # UI-testing target (the project deliberately ships UI-flavoured
          # coverage as integration XCTests, cf. StoryNotificationFlowTests),
          # so `xcodebuild test -only-testing:MeeshyTests` aborts the whole
          # suite at construction ("No target application path specified" →
          # NSInternalInconsistencyException from -[XCUIApplication init]).
          - "UI/BubbleExpandableTextUITests.swift"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: me.meeshy.app.tests
      CODE_SIGN_STYLE: Automatic
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "6.0"
      # The project-wide SWIFT_DEFAULT_ACTOR_ISOLATION = MainActor (SE-0466)
      # targets UI-centric production code. Applied to an XCTest bundle it makes
      # every `XCTestCase` subclass main-actor-isolated, so the synthesised
      # init()/init(invocation:)/init(selector:) conflict with XCTestCase's own
      # `nonisolated` initialisers and the compiler rejects every test class.
      # The SDK's Package.swift does the same: its test targets use
      # `coreSwiftSettings` (no `.defaultIsolation(MainActor)`) precisely because
      # `uiSwiftSettings` "breaks every XCTestCase subclass". Test classes opt
      # into `@MainActor` explicitly when they exercise main-actor code.
      SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
      # Host the tests inside the Meeshy.app process so they can hit
      # UIKit-bound APIs (UIApplication, UNUserNotificationCenter, etc.).
      BUNDLE_LOADER: "$(TEST_HOST)"
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Meeshy.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Meeshy"
    dependencies:
      - target: Meeshy
