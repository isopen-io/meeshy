# =============================================================================
# Traefik Dynamic Configuration for Production
# =============================================================================

# Floor TLS 1.2 conservé. sniStrict volontairement DÉSACTIVÉ : avec le
# provider file actif, il s'applique comme option TLS *par défaut* à tous les
# routeurs et ferme toute connexion dont le SNI ne matche aucun certificat
# (sondes/monitors sans SNI). À réactiver par-routeur explicitement si besoin.
tls:
  options:
    default:
      minVersion: VersionTLS12

http:
  middlewares:
    # Security headers
    secure-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
        customFrameOptionsValue: "SAMEORIGIN"
        referrerPolicy: "strict-origin-when-cross-origin"

    # Rate limiting
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # Gzip / Brotli compression for HTTP responses (Traefik 3 supports both
    # via Accept-Encoding negotiation). Skips payloads below 1 KB and any
    # response already declared as compressed by upstream.
    compress:
      compress:
        minResponseBodyBytes: 1024
        excludedContentTypes:
          - "image/png"
          - "image/jpeg"
          - "image/webp"
          - "image/avif"
          - "video/mp4"
          - "audio/mpeg"
          - "audio/ogg"
          - "audio/webm"
          - "application/octet-stream"

    # CORS for production
    cors-prod:
      headers:
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
          - "PATCH"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
        accessControlAllowOriginListRegex:
          - "https://.*\\.meeshy\\.me$"
          - "https://meeshy\\.me$"
        accessControlMaxAge: 86400
        addVaryHeader: true
