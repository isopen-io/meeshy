name: meeshy
services:
  # Traefik Reverse Proxy with automatic SSL
  traefik:
    image: traefik:v3.6
    container_name: meeshy-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=meeshy-network"
      # Provider file: indispensable pour que `compress@file` (et les autres
      # middlewares de dynamic.yaml) existent. Sans lui, dynamic.yaml n'est
      # que monté, jamais chargé → `compress@file` = référence morte.
      - "--providers.file.filename=/dynamic.yaml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${CERTBOT_EMAIL:-admin@meeshy.me}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TRAEFIK_USERS=${TRAEFIK_USERS}
      - API_USERS=${API_USERS}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
      - ./config/dynamic.yaml:/dynamic.yaml:ro
    networks:
      - meeshy-network
    labels:
      - "traefik.enable=true"
      # Dashboard Traefik sur traefik.${DOMAIN}
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      # Authentification pour Traefik dashboard
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_USERS:-''}"

  # Database Service
  database:
    image: ${DATABASE_IMAGE:-mongo:8.0}
    container_name: meeshy-database
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --noauth
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-meeshy}
    volumes:
      - database_data:/data/db
      - database_config:/data/configdb
      - ./shared/init-database.sh:/docker-entrypoint-initdb.d/init-database.sh:ro
      - ./shared/init-mongodb-replica.sh:/docker-entrypoint-initdb.d/init-mongodb-replica.sh:ro
      - ./shared/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./shared/init-postgresql.sql:/docker-entrypoint-initdb.d/init-postgresql.sql:ro
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh mongodb://localhost:27017/${MONGODB_DATABASE:-meeshy} --quiet || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # NoSQLClient - Interface MongoDB sur mongo.${DOMAIN}
  nosqlclient:
    image: mongoclient/mongoclient:latest
    container_name: meeshy-nosqlclient
    restart: unless-stopped
    environment:
      MONGOCLIENT_DEFAULT_CONNECTION_URL: "mongodb://${MONGODB_USER:-meeshy}:${MONGODB_PASSWORD:-MeeshyPassword123}@database:27017/${MONGODB_DATABASE:-meeshy}?authSource=admin"
      ROOT_URL: "https://mongo.${DOMAIN:-localhost}"
      PORT: 3000
    depends_on:
      database:
        condition: service_healthy
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nosqlclient.rule=Host(`mongo.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.nosqlclient.entrypoints=websecure"
      - "traefik.http.routers.nosqlclient.tls.certresolver=letsencrypt"
      - "traefik.http.services.nosqlclient.loadbalancer.server.port=3000"
      - "traefik.http.routers.nosqlclient.middlewares=mongo-auth"
      # Authentification pour MongoDB interface
      - "traefik.http.middlewares.mongo-auth.basicauth.users=${MONGO_USERS:-''}"

  # Redis Cache
  redis:
    image: redis:8-alpine
    container_name: meeshy-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # P3X Redis UI - Interface Redis sur redis.${DOMAIN}
  p3x-redis-ui:
    image: patrikx3/p3x-redis-ui:latest
    container_name: meeshy-p3x-redis-ui
    restart: unless-stopped
    environment:
      - P3X_REDIS_UI_SETTINGS={"hostname":"redis","port":6379,"password":"","database":0}
      - P3X_REDIS_UI_HTTP_PORT=7843
      - P3XRS_SETTINGS_PATH=/settings
    volumes:
      - redis-ui-data:/settings
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD-SHELL", "netstat -an | grep :7843 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.p3x-redis.rule=Host(`redis.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.p3x-redis.entrypoints=websecure"
      - "traefik.http.routers.p3x-redis.tls.certresolver=letsencrypt"
      - "traefik.http.services.p3x-redis.loadbalancer.server.port=7843"
      - "traefik.http.routers.p3x-redis.middlewares=redis-auth"
      # Authentification pour Redis interface
      - "traefik.http.middlewares.redis-auth.basicauth.users=${REDIS_USERS:-''}"

  # Translator Service sur ml.${DOMAIN}
  translator:
    image: ${TRANSLATOR_IMAGE:-isopen/meeshy-translator:latest}
    container_name: meeshy-translator
    restart: unless-stopped
    environment:
      - DATABASE_TYPE=${DATABASE_TYPE:-MONGODB}
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_SCHEMA_PATH=${PRISMA_SCHEMA_PATH}
      - PYTHONPATH=/workspace:/workspace/generated
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
      - HF_HOME=/workspace/models/huggingface
      - TORCH_HOME=/workspace/models/torch
      - PYANNOTE_CACHE=/workspace/models/pyannote
      - TRANSFORMERS_CACHE=/workspace/models/huggingface
      - HUGGINGFACE_HUB_CACHE=/workspace/models/huggingface
      - MAX_MESSAGE_LENGTH=10000
      - MAX_TEXT_LENGTH=100000
      - MAX_TRANSLATION_LENGTH=100000
      - MAX_TEXT_ATTACHMENT_THRESHOLD=100000
      - REDIS_URL=redis://redis:6379
      - HF_TOKEN=${HF_TOKEN}
      # QUEUED IMPROVEMENT — diarisation, TTS tuning (deploy via surgical patch when needed)
      - ENABLE_DIARIZATION=${ENABLE_DIARIZATION:-true}
      - TTS_MAX_NEW_TOKENS=${TTS_MAX_NEW_TOKENS:-2048}
      - TTS_MAX_SEGMENT_CHARS=${TTS_MAX_SEGMENT_CHARS:-1000}
      - TTS_MIN_SEGMENT_CHARS=${TTS_MIN_SEGMENT_CHARS:-50}
    volumes:
      - models_data:/workspace/models
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meeshy-network
    healthcheck:
      # Liveness léger (/live = réponse instantanée, sans await DB/ZMQ/modèles).
      # /health faisait des awaits DB+ZMQ+modèles sur le même event-loop que
      # l'inférence ML : sous charge CPU il dépassait le timeout → flapping
      # unhealthy → conteneur sorti du routing. /live ne flappe jamais.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/live', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      # Service ML sur ml.${DOMAIN}
      - "traefik.http.routers.translator.rule=Host(`ml.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.translator.entrypoints=websecure"
      - "traefik.http.routers.translator.tls.certresolver=letsencrypt"
      - "traefik.http.services.translator.loadbalancer.server.port=8000"
      # Pas d'authentification pour ML service

  # Gateway Service sur gate.${DOMAIN}
  gateway:
    image: ${GATEWAY_IMAGE:-isopen/meeshy-gateway:latest}
    container_name: meeshy-gateway
    restart: unless-stopped
    environment:
      - DATABASE_TYPE=${DATABASE_TYPE:-MONGODB}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - HF_TOKEN=${HF_TOKEN}
      - TRANSLATOR_URL=http://translator:8000
      - ZMQ_PUSH_URL=tcp://translator:5555
      - ZMQ_SUB_URL=tcp://translator:5558
      - ZMQ_TRANSLATOR_HOST=translator
      - ZMQ_TRANSLATOR_PUSH_PORT=5555
      - ZMQ_TRANSLATOR_SUB_PORT=5558
      - NODE_ENV=production
      - DOMAIN=${DOMAIN:-meeshy.me}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - UPLOAD_PATH=/app/uploads
      - PUBLIC_URL=${PUBLIC_URL:-https://gate.${DOMAIN:-meeshy.me}}
      - MAX_TRANSLATION_LENGTH=10000
      # Variables d'initialisation des utilisateurs
      - FORCE_DB_RESET=${FORCE_DB_RESET:-false}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MEESHY_PASSWORD=${MEESHY_PASSWORD}
      - ATABETH_PASSWORD=${ATABETH_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - MEESHY_EMAIL=${MEESHY_EMAIL}
      - ATABETH_EMAIL=${ATABETH_EMAIL}
      - ADMIN_SYSTEM_LANGUAGE=${ADMIN_SYSTEM_LANGUAGE}
      - ADMIN_REGIONAL_LANGUAGE=${ADMIN_REGIONAL_LANGUAGE}
      - ADMIN_CUSTOM_DESTINATION_LANGUAGE=${ADMIN_CUSTOM_DESTINATION_LANGUAGE}
      - MEESHY_SYSTEM_LANGUAGE=${MEESHY_SYSTEM_LANGUAGE}
      - MEESHY_REGIONAL_LANGUAGE=${MEESHY_REGIONAL_LANGUAGE}
      - MEESHY_CUSTOM_DESTINATION_LANGUAGE=${MEESHY_CUSTOM_DESTINATION_LANGUAGE}
      - ATABETH_USERNAME=${ATABETH_USERNAME}
      - ATABETH_FIRST_NAME=${ATABETH_FIRST_NAME}
      - ATABETH_LAST_NAME=${ATABETH_LAST_NAME}
      - ATABETH_ROLE=${ATABETH_ROLE}
      - ATABETH_SYSTEM_LANGUAGE=${ATABETH_SYSTEM_LANGUAGE}
      - ATABETH_REGIONAL_LANGUAGE=${ATABETH_REGIONAL_LANGUAGE}
      - ATABETH_CUSTOM_DESTINATION_LANGUAGE=${ATABETH_CUSTOM_DESTINATION_LANGUAGE}
      - FIREBASE_ADMIN_CREDENTIALS_PATH=/app/secrets/firebase-admin-sdk.json
      - APNS_KEY_ID=J73QFCYZGC
      - APNS_TEAM_ID=D72UK7R5RE
      - APNS_KEY_PATH=/app/secrets/apns_key.p8
      - APNS_BUNDLE_ID=me.meeshy.app
      - ENABLE_APNS_PUSH=true
      - APNS_ENVIRONMENT=production
      # Email Service Configuration
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-brevo}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@meeshy.me}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Meeshy Sama}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY:-}
      - ATTACHMENT_MASTER_KEY=${ATTACHMENT_MASTER_KEY:-}
      - AGENT_HOST=agent
      - TURN_SECRET=${TURN_SECRET}
      - TURN_SERVERS=${TURN_SERVERS:-meeshy.me:3478}
      - TURN_CREDENTIAL_TTL=${TURN_CREDENTIAL_TTL:-86400}
      # QUEUED IMPROVEMENT — session config + branding (deploy via surgical patch when sessions feature lands)
      - SESSION_EXPIRY_MOBILE_DAYS=${SESSION_EXPIRY_MOBILE_DAYS:-365}
      - SESSION_EXPIRY_DESKTOP_DAYS=${SESSION_EXPIRY_DESKTOP_DAYS:-30}
      - SESSION_EXPIRY_TRUSTED_DAYS=${SESSION_EXPIRY_TRUSTED_DAYS:-365}
      - MAX_SESSIONS_PER_USER=${MAX_SESSIONS_PER_USER:-10}
      - BRAND_LOGO_URL=${BRAND_LOGO_URL:-}
    volumes:
      - gateway_uploads:/app/uploads
      - /opt/meeshy/secrets/firebase-admin-sdk.json:/app/secrets/firebase-admin-sdk.json
      - /opt/meeshy/secrets/apns_key.p8:/app/secrets/apns_key.p8:ro
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # API Gateway sur gate.${DOMAIN}
      - "traefik.http.routers.gateway.rule=Host(`gate.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gateway.middlewares=compress@file"
      - "traefik.http.services.gateway.loadbalancer.server.port=3000"

  # Static Files Service - Nginx pour servir les fichiers uploadés sur static.${DOMAIN}
  static-files:
    image: nginx:alpine
    container_name: meeshy-static-files
    restart: unless-stopped
    volumes:
      - frontend_uploads:/usr/share/nginx/html/u:ro
      - gateway_uploads:/usr/share/nginx/html/uploads:ro
      - ./docker/nginx/static-files.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # Sous-domaine dédié pour les fichiers statiques
      - "traefik.http.routers.static.rule=Host(`static.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.static.entrypoints=websecure"
      - "traefik.http.routers.static.tls.certresolver=letsencrypt"
      - "traefik.http.routers.static.middlewares=compress@file"
      - "traefik.http.services.static.loadbalancer.server.port=80"

  # Frontend Service sur ${DOMAIN}
  frontend:
    image: ${FRONTEND_IMAGE:-isopen/meeshy-frontend:latest}
    container_name: meeshy-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://gate.${DOMAIN:-localhost}
      - NEXT_PUBLIC_WS_URL=wss://gate.${DOMAIN:-localhost}
      - NEXT_PUBLIC_TRANSLATION_URL=https://ml.${DOMAIN:-localhost}/translate
      - NEXT_PUBLIC_BACKEND_URL=https://gate.${DOMAIN:-localhost}
      # QUEUED IMPROVEMENT — Next.js server-side fetch via container network (deploy when SSR data fetching refactor lands)
      - INTERNAL_BACKEND_URL=http://gateway:3000
      - NEXT_PUBLIC_FRONTEND_URL=https://${DOMAIN:-localhost}
      - NEXT_PUBLIC_STATIC_URL=https://static.${DOMAIN:-localhost}
      - NEXT_PUBLIC_DISABLE_CLIENT_TRANSLATION=${NEXT_PUBLIC_DISABLE_CLIENT_TRANSLATION:-true}
      - NEXT_PUBLIC_USE_API_TRANSLATION_ONLY=${NEXT_PUBLIC_USE_API_TRANSLATION_ONLY:-true}
      - NEXT_PUBLIC_DEBUG_LOGS=${NEXT_PUBLIC_DEBUG_LOGS:-false}
      - NODE_ENV=production
      - NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-XF65H07ZRY
      - NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyCGBiVIUvW8CiVytXGHN1za2T3yI_7ynro
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=meeshy-me.firebaseapp.com
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=meeshy-me.firebasestorage.app
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=meeshy-me
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=775794634022
      - NEXT_PUBLIC_FIREBASE_APP_ID=1:775794634022:web:d244d7c97208322dc365e7
      - NEXT_PUBLIC_FIREBASE_VAPID_KEY=BDRguFxJ5f_alFmp-TCGc2VsLAaLEXybgcUGmIE7MMy4jpCjCYJZCcPGV9G1QKN2SBzYQhRuNL28fhKb2hsvvPo
      - NEXT_PUBLIC_ENABLE_PUSH_NOTIFICATIONS=true
      # QUEUED IMPROVEMENT — password reset feature flag (deploy when password reset UI lands)
      - NEXT_PUBLIC_ENABLE_PASSWORD_RESET=true
    volumes:
      - frontend_uploads:/app/public/u
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:3100"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      # Frontend principal sur ${DOMAIN} et www.${DOMAIN}
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`) || Host(`www.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.middlewares=compress@file"
      - "traefik.http.services.frontend.loadbalancer.server.port=3100"
      - "traefik.http.routers.frontend.priority=1"

  # ===========================================================================
  agent:
    image: ${AGENT_IMAGE:-isopen/meeshy-agent:latest}
    container_name: meeshy-agent
    restart: unless-stopped
    environment:
      - DATABASE_URL=mongodb://database:27017/meeshy?replicaSet=rs0
      - REDIS_URL=redis://redis:6379
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-5-sonnet-20240620}
      - ZMQ_HOST=0.0.0.0
      - ZMQ_PULL_PORT=5560
      - ZMQ_PUB_PORT=5561
      - NODE_ENV=production
      - PORT=3200
    depends_on:
      - database
      - redis
    networks:
      - meeshy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agent.rule=Host(`agent.${DOMAIN:-meeshy.me}`)"
      - "traefik.http.routers.agent.entrypoints=websecure"
      - "traefik.http.routers.agent.tls.certresolver=letsencrypt"
      - "traefik.http.services.agent.loadbalancer.server.port=3200"

  # COTURN - TURN/STUN Server for WebRTC
  coturn:
    image: coturn/coturn:4.6
    container_name: meeshy-coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config/turnserver.conf:/etc/turnserver.conf:ro
      - traefik_dumped_certs:/etc/coturn/dumped:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e

        CERT_FILE=/etc/coturn/dumped/certs/turn.meeshy.me.crt
        KEY_FILE=/etc/coturn/dumped/private/turn.meeshy.me.key

        # 1) Attendre que le dumper ait extrait les certs (bornage 5 min)
        retry=0
        while [ ! -f "$$CERT_FILE" ] || [ ! -f "$$KEY_FILE" ]; do
          retry=$$((retry + 1))
          if [ $$retry -gt 30 ]; then
            echo "[FATAL] coturn cert files not present after 5min - dumper failure or first-issuance pending" >&2
            exit 1
          fi
          echo "[coturn] waiting for cert files in /etc/coturn/dumped (try $$retry/30)"
          sleep 10
        done

        # 2) Installer inotify-tools pour le watcher (image coturn = alpine)
        apk add --no-cache inotify-tools >/dev/null 2>&1 || {
          echo "[WARN] apk add inotify-tools failed - auto-reload desactive" >&2
        }

        # 3) Watcher arriere-plan : SIGUSR2 self quand le .crt change.
        # On watch le DOSSIER en monitor mode (-m) et on filtre par nom de
        # fichier, parce que traefik-certs-dumper utilise write-temp + atomic
        # rename : watcher le fichier directement perd l inode apres rename.
        if command -v inotifywait >/dev/null 2>&1; then
          (
            inotifywait -m -q -e close_write,moved_to --format '%f' \
              /etc/coturn/dumped/certs/ |
            while read file; do
              if [ "$$file" = "turn.meeshy.me.crt" ]; then
                pkill -USR2 turnserver && echo "[coturn] cert changed, SIGUSR2 sent"
              fi
            done
          ) &
        fi

        exec turnserver -c /etc/turnserver.conf
    healthcheck:
      test: ["CMD", "turnutils_stunclient", "-p", "3478", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      certs-dumper:
        condition: service_started

  # ===========================================================================
  # TURN CERT STUB - Router Traefik factice pour declencher l emission ACME
  # ===========================================================================
  turn-cert-stub:
    image: nginx:alpine
    container_name: meeshy-turn-cert-stub
    restart: unless-stopped
    networks:
      - meeshy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.turn-cert-stub.rule=Host(`turn.${DOMAIN:-meeshy.me}`)"
      - "traefik.http.routers.turn-cert-stub.entrypoints=websecure"
      - "traefik.http.routers.turn-cert-stub.tls.certresolver=letsencrypt"
      - "traefik.http.services.turn-cert-stub.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 60s
      timeout: 5s
      retries: 2
      start_period: 10s

  # ===========================================================================
  # CERTS DUMPER - Extrait acme.json en PEM (consomme par coturn)
  # ===========================================================================
  certs-dumper:
    image: ldez/traefik-certs-dumper:v2.11.2
    container_name: meeshy-certs-dumper
    restart: unless-stopped
    entrypoint:
      - traefik-certs-dumper
      - file
      - --version=v2
      - --watch
      - --source=/letsencrypt/acme.json
      - --dest=/dumped
      - --post-hook=chmod -R a+r /dumped
    volumes:
      - traefik_certs:/letsencrypt:ro
      - traefik_dumped_certs:/dumped
    networks:
      - meeshy-network
    depends_on:
      traefik:
        condition: service_started

volumes:
  database_data:
  database_config:
  redis_data:
  redis-ui-data:
  traefik_certs:
  traefik_dumped_certs:
  models_data:
  gateway_uploads:
  frontend_uploads:

networks:
  meeshy-network:
    driver: bridge
