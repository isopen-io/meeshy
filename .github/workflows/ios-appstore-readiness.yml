name: iOS App Store publishability

# On every commit to main that touches the iOS app, prove `me.meeshy.app` can
# still be published to App Store Connect — ANDP's honest preflight: the API
# credentials sign (ES256), authenticate against the live API, and the app
# record exists. Read-only and fast (API calls, no build). Fails — naming the
# exact reason — when publishing could not work (revoked key, missing app
# record, etc.). It does NOT check version/build/metadata readiness.

on:
  push:
    branches: [main]
    paths:
      - 'apps/ios/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-appstore-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publishable:
    name: App Store publish preflight
    runs-on: ubuntu-latest
    steps:
      # ANDP expects the raw .p8 PEM; the repo stores it base64-encoded
      # (ASC_KEY_CONTENT), same as ios-release.yml. Decode it and hand it to the
      # action via an env var, masking every line so it can never reach the log.
      - name: Decode ASC private key (base64 -> PEM)
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_KEY_CONTENT:-}" ]; then
            echo "::error::secret ASC_KEY_CONTENT is not set — cannot run the preflight"
            exit 1
          fi
          PEM="$(printf '%s' "$ASC_KEY_CONTENT" | base64 --decode)"
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done <<< "$PEM"
          {
            echo "ANDP_ASC_PEM<<ANDP_PEM_EOF"
            printf '%s\n' "$PEM"
            echo "ANDP_PEM_EOF"
          } >> "$GITHUB_ENV"

      - name: ANDP publish preflight
        uses: isopen-io/andp@2b36ad054cc56fb15ec739d2e995553b6a226eec
        with:
          key-id: ${{ secrets.ASC_KEY_ID || '5542B6LVNL' }}
          issuer-id: ${{ secrets.ASC_ISSUER_ID || '69a6de89-ae7a-47e3-e053-5b8c7c11a4d1' }}
          private-key: ${{ env.ANDP_ASC_PEM }}
          bundle-id: me.meeshy.app
