name: iOS Release

# Mirrors `./apps/ios/meeshy.sh release` (the do_release function) so a tag push
# or manual dispatch reproduces EXACTLY what a maintainer runs locally:
#   - lane: beta (TestFlight, default) or release (App Store)
#   - fastlane args built the same way: `skip_tests:true` ONLY when requested,
#     `changelog:…` / `version:…` only when provided. skip_metadata /
#     skip_screenshots are NOT forced — the Fastfile defaults them to false,
#     matching the local invocation.
#   - ASC_KEY_ID / ASC_ISSUER_ID default to the repo's known values (already in
#     meeshy.sh) and are overridable via secrets.
#   - Toolchain: Xcode 26.1.1 (Swift 6.2) — same as ios-tests.yml / sdk-tests.yml
#     and the local toolchain meeshy.sh uses. Xcode 16 cannot resolve the
#     swift-tools-version 6.2 package graph.

# Trigger: a `v*` tag push (cut by release.yml's changesets job) OR a manual
# workflow_dispatch. NOTE: release.yml must push that tag with a PAT
# (secrets.RELEASE_PAT) for the push to fire this workflow — a tag pushed with
# the default GITHUB_TOKEN is intentionally ignored by GitHub. Without the PAT,
# trigger this release manually via "Run workflow" (workflow_dispatch) below.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane (beta = TestFlight, release = App Store)'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - release
      skip_tests:
        description: 'Skip the unit-test pre-flight (meeshy.sh --skip-tests)'
        required: false
        default: true
        type: boolean
      version:
        description: 'Marketing version to set (optional, e.g. 1.4.0)'
        required: false
        default: ''
        type: string
      changelog:
        description: 'TestFlight "What to Test" changelog (optional)'
        required: false
        default: ''
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build & Upload
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Swift 6.2 toolchain — must match ios-tests.yml / sdk-tests.yml and the
      # local toolchain meeshy.sh release builds against. Xcode 16 cannot open
      # the swift-tools-version 6.2 package graph.
      - name: Select Xcode 26.1.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer

      # XcodeGen owns project generation: regenerate the pbxproj from
      # project.yml before any build so newly-added sources are compiled.
      # Runs before the SPM cache step so the cache key hashes the generated
      # pbxproj. Keep in sync with ios-tests.yml.
      - name: Generate Xcode project (XcodeGen)
        run: |
          brew install xcodegen
          cd apps/ios
          xcodegen generate

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/ios

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: |
            apps/ios/Build/SourcePackages
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('apps/ios/Meeshy.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Setup SSH for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Decode GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > apps/ios/Meeshy/GoogleService-Info.plist

      - name: Decode API Key
        run: |
          echo "${{ secrets.ASC_KEY_CONTENT }}" | base64 --decode > /tmp/AuthKey.p8

      # Resolve the lane + the optional knobs exactly like meeshy.sh's do_release:
      # a tag push behaves like `./meeshy.sh release` (lane: beta), a manual
      # dispatch maps the inputs to the same RELEASE_TARGET / SKIP_TESTS /
      # RELEASE_VERSION / RELEASE_CHANGELOG variables.
      - name: Determine fastlane parameters
        id: lane
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "lane=${{ github.event.inputs.lane }}" >> "$GITHUB_OUTPUT"
            echo "skip_tests=${{ github.event.inputs.skip_tests }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "changelog=${{ github.event.inputs.changelog }}" >> "$GITHUB_OUTPUT"
          else
            echo "lane=beta" >> "$GITHUB_OUTPUT"
            echo "skip_tests=true" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "changelog=" >> "$GITHUB_OUTPUT"
          fi

      # Same invocation contract as meeshy.sh's do_release: build the fastlane
      # args in a bash array (preserves spaces in the changelog), then
      # `bundle exec fastlane <lane> <args>`. skip_metadata / skip_screenshots
      # are intentionally NOT passed — the Fastfile defaults them to false,
      # exactly like the local run.
      - name: Run Fastlane (parity with ./meeshy.sh release)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID || '5542B6LVNL' }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || '69a6de89-ae7a-47e3-e053-5b8c7c11a4d1' }}
          ASC_KEY_FILEPATH: /tmp/AuthKey.p8
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          FASTLANE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          FASTLANE_ITC_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # App Store review demo account — never commit these values.
          # The release lane refuses to run without them.
          # See apps/ios/fastlane/SECRETS.md.
          DEMO_USER: ${{ secrets.DEMO_USER }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
          DEMO_REVIEW_NOTES: ${{ secrets.DEMO_REVIEW_NOTES }}
          LANE: ${{ steps.lane.outputs.lane }}
          SKIP_TESTS: ${{ steps.lane.outputs.skip_tests }}
          RELEASE_VERSION: ${{ steps.lane.outputs.version }}
          RELEASE_CHANGELOG: ${{ steps.lane.outputs.changelog }}
        run: |
          cd apps/ios
          args=()
          [ "${SKIP_TESTS}" = "true" ] && args+=("skip_tests:true")
          [ -n "${RELEASE_CHANGELOG}" ] && args+=("changelog:${RELEASE_CHANGELOG}")
          [ -n "${RELEASE_VERSION}" ] && args+=("version:${RELEASE_VERSION}")
          echo "→ bundle exec fastlane ${LANE} ${args[*]}"
          bundle exec fastlane "${LANE}" "${args[@]}"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: Meeshy-${{ github.ref_name }}
          path: apps/ios/build/Meeshy.ipa
          retention-days: 30
