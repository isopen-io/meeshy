name: iOS Release (ANDP)

# Release the iOS app through isopen-io/andp (API-first App Store Connect
# publishing — no Transporter/altool, no fastlane, no agvtool). Flow:
#   1. build (macOS): xcodebuild archives + exports the IPA. Signing assets (the
#      Apple Distribution cert + App Store profiles) are pulled from the match
#      certificates repo and decrypted with openssl — no fastlane. The build
#      number comes from `andp build-number --strategy max-build` (numeric global
#      max on ASC + 1), applied as the CURRENT_PROJECT_VERSION build setting so
#      CFBundleVersion resolves from it — no agvtool, no file mutation.
#   2a. target=testflight: `andp release <ipa> [--group]` uploads and waits VALID.
#   2b. target=appstore: `andp release start --ship` advances to the approval
#       gate and WAITS. A protected environment (`appstore-submit`) holds the
#       human approval; once approved, ANDP submits the build for App Review.
#
# One-time setup for the App Store gate: create a repo Environment named
# `appstore-submit` (Settings → Environments) with required reviewers — that is
# the "wait for App Store" pause. Metadata/screenshots must already be valid in
# App Store Connect (managed by the fastlane workflow's deliver or the ASC UI);
# ANDP submits the build against the existing version's metadata.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to release'
        type: choice
        options: [testflight, appstore]
        default: testflight
      skip_tests:
        description: 'Skip the unit-test pre-flight'
        type: boolean
        default: true
      version:
        description: 'Marketing version to set (optional, e.g. 1.4.0)'
        type: string
        default: ''
      group:
        description: 'TestFlight group to link the build to (optional)'
        type: string
        default: ''

concurrency:
  group: ios-release-andp
  cancel-in-progress: false

env:
  ANDP_BUNDLE_ID: me.meeshy.app
  ANDP_REF: v1

jobs:
  # ---------------------------------------------------------------------------
  build:
    name: Build IPA (xcodebuild + ANDP — no fastlane)
    runs-on: macos-15
    timeout-minutes: 60
    env:
      ANDP_KEY_ID: ${{ secrets.ASC_KEY_ID || '5542B6LVNL' }}
      ANDP_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || '69a6de89-ae7a-47e3-e053-5b8c7c11a4d1' }}
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.1.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer

      - name: Generate Xcode project (XcodeGen)
        run: |
          brew install xcodegen
          cd apps/ios
          xcodegen generate

      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'

      - name: Install ANDP
        run: python3 -m pip install --quiet "andp @ git+https://github.com/isopen-io/andp@v1"

      - name: Cache SPM packages
        uses: actions/cache@v6
        with:
          path: |
            apps/ios/Build/SourcePackages
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('apps/ios/Meeshy.xcodeproj/project.pbxproj') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Decode GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: printf '%s' "$GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode > apps/ios/Meeshy/GoogleService-Info.plist

      - name: Decode ASC API key + write ANDP credentials
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          set -euo pipefail
          printf '%s' "$ASC_KEY_CONTENT" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          umask 077
          {
            echo "accounts:"; echo "  primary:"; echo "    asc_api:"
            echo "      key_id: \"$ANDP_KEY_ID\""
            echo "      issuer_id: \"$ANDP_ISSUER_ID\""
            echo "      key_content: |"
            sed 's/^/        /' "$RUNNER_TEMP/AuthKey.p8"
          } > apps/ios/secrets.yml

      # Reuse the match certificates repo WITHOUT fastlane: clone it over SSH,
      # decrypt the Apple Distribution cert + App Store profiles with openssl
      # (match's legacy AES-256-CBC), and install them into a temporary keychain
      # + the profiles dir. This is exactly what `fastlane match` set up — the
      # same certs/profiles the proven build_production lane used — minus fastlane.
      - name: Set up SSH (match certificates repo)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_DEPLOY_KEY }}

      - name: Install signing assets from the match repo (git + openssl)
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          set -euo pipefail
          CERTS="$RUNNER_TEMP/match-certs"
          GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new" \
            git clone --depth 1 "$MATCH_GIT_URL" "$CERTS"

          # match legacy encryption (force_legacy_encryption: true) = AES-256-CBC,
          # base64, MD5 key derivation; fall back to SHA-256 for any newer entry.
          dec() {
            for md in md5 sha256; do
              openssl aes-256-cbc -d -k "$MATCH_PASSWORD" -a -md "$md" -in "$1" -out "$2" 2>/dev/null && return 0
            done
            echo "::error::could not decrypt $1 (wrong MATCH_PASSWORD?)"; return 1
          }

          KC="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "" "$KC"
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)

          shopt -s nullglob
          n=0
          for p12 in "$CERTS"/certs/distribution/*.p12; do
            dec "$p12" "$RUNNER_TEMP/dist.p12"
            security import "$RUNNER_TEMP/dist.p12" -k "$KC" -P "" -T /usr/bin/codesign -f pkcs12
            n=$((n+1))
          done
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KC" >/dev/null
          echo "Imported $n distribution certificate(s)."

          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          m=0
          for prof in "$CERTS"/profiles/appstore/*.mobileprovision; do
            dec "$prof" "$PROFILES/match-$m.mobileprovision"   # Xcode scans by content, not name
            m=$((m+1))
          done
          echo "Installed $m App Store provisioning profile(s)."

      - name: Compute build number (ANDP max-build)
        run: |
          set -euo pipefail
          # ANDP's max-build queries every build on ASC (incl. PROCESSING), so no
          # local floor is needed. No agvtool, no file mutation.
          BUILD_NUMBER="$(cd apps/ios && andp build-number me.meeshy.app --strategy max-build)"
          echo "→ build number $BUILD_NUMBER"
          echo "ANDP_BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Archive (xcodebuild — ASC-key signing; version via build settings)
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          cd apps/ios
          # CFBundleVersion resolves from $(CURRENT_PROJECT_VERSION) and
          # CFBundleShortVersionString from $(MARKETING_VERSION); we set them as
          # build settings here — future-proof, no agvtool, no file mutation.
          VERSION_ARGS=("CURRENT_PROJECT_VERSION=$ANDP_BUILD_NUMBER")
          [ -n "${RELEASE_VERSION}" ] && VERSION_ARGS+=("MARKETING_VERSION=$RELEASE_VERSION")
          xcodebuild archive \
            -project Meeshy.xcodeproj -scheme Meeshy -configuration Release \
            -archivePath build/Meeshy.xcarchive \
            -derivedDataPath ./Build -clonedSourcePackagesDirPath ./SourcePackages \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$ANDP_KEY_ID" \
            -authenticationKeyIssuerID "$ANDP_ISSUER_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=D72UK7R5RE CODE_SIGN_STYLE=Automatic SWIFT_OPTIMIZATION_LEVEL=-Onone \
            "${VERSION_ARGS[@]}"

      # The same standalone script Xcode Cloud / the local scheme use — strips
      # ad-hoc framework signatures so the export re-signs cleanly (ITMS-90035).
      - name: Strip embedded framework signatures (ITMS-90035)
        run: |
          set -eu
          cd apps/ios
          CI_XCODEBUILD_ACTION=archive CI_ARCHIVE_PATH="$PWD/build/Meeshy.xcarchive" ./ci_scripts/ci_post_xcodebuild.sh

      - name: Export IPA (xcodebuild -exportArchive)
        run: |
          set -euo pipefail
          cd apps/ios
          # ExportOptions.plist is a plain config file (app-store / automatic) —
          # no fastlane is executed.
          xcodebuild -exportArchive \
            -archivePath build/Meeshy.xcarchive -exportPath build \
            -exportOptionsPlist fastlane/ExportOptions.plist \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            -authenticationKeyID "$ANDP_KEY_ID" \
            -authenticationKeyIssuerID "$ANDP_ISSUER_ID" \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: meeshy-ipa
          path: apps/ios/build/Meeshy.ipa
          retention-days: 30
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  testflight:
    name: Upload to TestFlight (ANDP)
    needs: build
    if: ${{ inputs.target == 'testflight' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install ANDP
        run: python3 -m pip install --quiet "andp @ git+https://github.com/isopen-io/andp@$ANDP_REF"
      - uses: actions/download-artifact@v7
        with:
          name: meeshy-ipa
          path: ipa
      - name: Write ANDP credentials
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID || '5542B6LVNL' }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || '69a6de89-ae7a-47e3-e053-5b8c7c11a4d1' }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          set -euo pipefail
          PEM="$(printf '%s' "$ASC_KEY_CONTENT" | base64 --decode)"
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done <<< "$PEM"
          umask 077
          {
            echo "accounts:"; echo "  primary:"; echo "    asc_api:"
            echo "      key_id: \"$ASC_KEY_ID\""
            echo "      issuer_id: \"$ASC_ISSUER_ID\""
            echo "      key_content: |"
            printf '%s\n' "$PEM" | sed 's/^/        /'
          } > secrets.yml
      - name: Verify then release to TestFlight
        env:
          GROUP: ${{ inputs.group }}
        run: |
          set -euo pipefail
          python3 -m andp verify "$ANDP_BUNDLE_ID"
          IPA="$(ls ipa/*.ipa | head -1)"
          echo "Releasing $IPA to TestFlight via ANDP…"
          if [ -n "$GROUP" ]; then
            python3 -m andp release "$IPA" --group "$GROUP"
          else
            python3 -m andp release "$IPA"
          fi

  # ---------------------------------------------------------------------------
  appstore-prepare:
    name: Prepare App Store submission (ANDP, waits at gate)
    needs: build
    if: ${{ inputs.target == 'appstore' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_id: ${{ steps.prepare.outputs.release_id }}
    steps:
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install ANDP
        run: python3 -m pip install --quiet "andp @ git+https://github.com/isopen-io/andp@$ANDP_REF"
      - uses: actions/download-artifact@v7
        with:
          name: meeshy-ipa
          path: ipa
      - name: Write ANDP credentials + policy
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID || '5542B6LVNL' }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || '69a6de89-ae7a-47e3-e053-5b8c7c11a4d1' }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          set -euo pipefail
          PEM="$(printf '%s' "$ASC_KEY_CONTENT" | base64 --decode)"
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done <<< "$PEM"
          umask 077
          {
            echo "accounts:"; echo "  primary:"; echo "    asc_api:"
            echo "      key_id: \"$ASC_KEY_ID\""
            echo "      issuer_id: \"$ASC_ISSUER_ID\""
            echo "      key_content: |"
            printf '%s\n' "$PEM" | sed 's/^/        /'
          } > secrets.yml
          # Declare export compliance (standard/exempt encryption). allow_submit
          # is left false on purpose: the release advances to the approval gate
          # and WAITS — it never auto-submits.
          printf 'compliance:\n  uses_non_exempt_encryption: false\n' > andp.yml
      - name: Start --ship and advance to the approval gate
        id: prepare
        env:
          GROUP: ${{ inputs.group }}
        run: |
          set -euo pipefail
          python3 -m andp verify "$ANDP_BUNDLE_ID"
          IPA="$(ls ipa/*.ipa | head -1)"
          if [ -n "$GROUP" ]; then
            START=$(python3 -m andp release start "$IPA" --ship --group "$GROUP" --json)
          else
            START=$(python3 -m andp release start "$IPA" --ship --json)
          fi
          echo "$START" | jq .
          RID=$(echo "$START" | jq -r '.release_id')
          echo "release_id=$RID" >> "$GITHUB_OUTPUT"
          echo "Polling release $RID until the App Store approval gate…"
          for i in $(seq 1 60); do
            OUT=$(python3 -m andp release poll "$RID" --json); echo "$OUT" | jq -c .
            if [ "$(echo "$OUT" | jq -r '.needs_approval // false')" = "true" ]; then
              echo "::notice::Build uploaded and attached — release $RID is at the App Store approval gate. Waiting for the appstore-submit environment approval."
              exit 0
            fi
            if [ "$(echo "$OUT" | jq -r '.needs_precheck_fix // false')" = "true" ]; then
              echo "::error::Precheck failed — fix the App Store metadata, then re-run."
              echo "$OUT" | jq '.precheck_report'
              exit 1
            fi
            if [ "$(echo "$OUT" | jq -r '.terminal // false')" = "true" ]; then
              [ "$(echo "$OUT" | jq -r '.ok // false')" = "true" ] && exit 0
              echo "::error::release failed"; echo "$OUT" | jq '.error'; exit 1
            fi
            sleep "$(echo "$OUT" | jq -r '.retry_after // 20')"
          done
          echo "::error::timed out before reaching the approval gate"; exit 1
      - name: Persist ANDP release state
        uses: actions/upload-artifact@v7
        with:
          name: andp-state
          path: .andp
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  appstore-submit:
    name: Submit to App Review (after approval)
    needs: appstore-prepare
    if: ${{ inputs.target == 'appstore' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Protected environment = the human "wait for App Store" gate. Configure it
    # once (Settings → Environments → appstore-submit) with required reviewers.
    environment: appstore-submit
    steps:
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install ANDP
        run: python3 -m pip install --quiet "andp @ git+https://github.com/isopen-io/andp@$ANDP_REF"
      - uses: actions/download-artifact@v7
        with:
          name: andp-state
          path: .andp
      - name: Write ANDP credentials
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID || '5542B6LVNL' }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID || '69a6de89-ae7a-47e3-e053-5b8c7c11a4d1' }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          set -euo pipefail
          PEM="$(printf '%s' "$ASC_KEY_CONTENT" | base64 --decode)"
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done <<< "$PEM"
          umask 077
          {
            echo "accounts:"; echo "  primary:"; echo "    asc_api:"
            echo "      key_id: \"$ASC_KEY_ID\""
            echo "      issuer_id: \"$ASC_ISSUER_ID\""
            echo "      key_content: |"
            printf '%s\n' "$PEM" | sed 's/^/        /'
          } > secrets.yml
          printf 'compliance:\n  uses_non_exempt_encryption: false\n' > andp.yml
      - name: Approve and submit for review
        env:
          RID: ${{ needs.appstore-prepare.outputs.release_id }}
        run: |
          set -euo pipefail
          echo "Approving release $RID (opens the submit gate)…"
          python3 -m andp release approve "$RID"
          for i in $(seq 1 40); do
            OUT=$(python3 -m andp release poll "$RID" --json); echo "$OUT" | jq -c .
            if [ "$(echo "$OUT" | jq -r '.terminal // false')" = "true" ]; then
              [ "$(echo "$OUT" | jq -r '.ok // false')" = "true" ] \
                && { echo "::notice::Submitted to App Review ✅"; exit 0; }
              echo "::error::submission failed"; echo "$OUT" | jq '.error'; exit 1
            fi
            sleep "$(echo "$OUT" | jq -r '.retry_after // 15')"
          done
          echo "::error::timed out during submission"; exit 1
