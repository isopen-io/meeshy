# Autonomous test-coverage routine.
#
# Every 3 hours, launches a fresh Claude Code agent that executes the playbook in
# tasks/test-coverage-routine/ROUTINE.md: it reads PROGRESS.md, picks the next slice
# (= one "phase"), writes tests TDD-style to >=92% line+branch on the targeted modules,
# runs the reviewer gate (REVIEWER.md), and — when CI is green + reviewer PASS + the diff
# is tests/config only + a clean rebase on main — opens a PR and MERGES it to main.
# If any merge precondition fails, it leaves the PR open for a human instead of merging.
#
# NOTE: scheduled workflows only fire from the repository's DEFAULT branch. This file must
# be merged to main before cron will run. Until then, use the "Run workflow" button.
#
# SETUP REQUIRED (one-time, by a maintainer):
#   1. Add ONE secret (Settings → Secrets and variables → Actions):
#        - ANTHROPIC_API_KEY        (Anthropic API key), OR
#        - CLAUDE_CODE_OAUTH_TOKEN  (Claude Code OAuth token, from `claude setup-token`)
#   2. Allow GitHub Actions to create and merge PRs:
#        Settings → Actions → General → "Allow GitHub Actions to create and approve pull
#        requests"; and ensure branch protection on main permits the bot to merge (or grant
#        the required check + an auto-merge path). The routine NEVER force-merges past red CI.
#
# Cadence is "best effort" cron — GitHub may delay scheduled runs under load.

name: Test Coverage Routine

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:
    inputs:
      slice:
        description: "Optional: force a specific slice (e.g. 'P0 Auth × gateway'). Blank = next in PROGRESS.md."
        required: false
        type: string

# One phase at a time. The PROGRESS.md ◐ marker is the durable lock; this is the in-CI guard.
# Do NOT cancel in-progress — let a run finish its phase (it ends in a merge).
concurrency:
  group: test-coverage-routine
  cancel-in-progress: false

permissions:
  contents: write          # commit, push the per-phase branch, merge to main
  pull-requests: write     # create + merge the per-phase PR
  id-token: write

jobs:
  routine:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout main (full history for branching + rebase)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "meeshy-coverage-bot"
          git config user.email "coverage-bot@users.noreply.github.com"

      # Toolchains the agent may need to run suites. Kept light; the agent installs
      # per-app deps for the slice it actually touches (see ROUTINE.md §Pre-flight).
      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Setup uv (Python, for translator slices)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Run the coverage routine
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          # If you use an OAuth token instead of an API key, uncomment:
          # claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are the autonomous test-coverage agent for this repository.

            Read and follow EXACTLY: tasks/test-coverage-routine/ROUTINE.md
            State / what to do next:           tasks/test-coverage-routine/PROGRESS.md
            Reviewer rubric (mandatory gate):  tasks/test-coverage-routine/REVIEWER.md

            Mission for THIS run = complete ONE phase end-to-end:
            - Branch off the latest main: `claude/coverage/<slice-id>`.
            - Pick the next slice: Sprint 0 items first, then the highest-priority ☐ cell.
              Forced slice (if provided): "${{ github.event.inputs.slice }}"
            - Write tests TDD-style to >=92% line+branch on the slice's targeted modules,
              covering the edge-case checklist. Also achieve >=92% coverage on the diff's
              changed lines.
            - Pass the reviewer gate (REVIEWER.md). Update PROGRESS.md, manifests, RUNLOG.md.
            - Open a PR and run its CI. MERGE the PR to main (squash) ONLY when ALL hold:
                (1) the diff is tests + test/CI config only — NO production logic changes,
                (2) full CI is green,
                (3) reviewer verdict PASS,
                (4) the branch rebases cleanly on the latest main (resolve conflicts: keep
                    BOTH sides' tests, re-run the suite, never drop assertions).
              If any precondition fails and you cannot fix it within this run, leave the PR
              OPEN, mark the slice `⚠ blocked` in PROGRESS.md with the reason, and stop.
            - Advance exactly one phase. Leave main green.

            Hard rules: behavior over implementation; no tautological tests; never lower a
            coverage floor or weaken a test to pass; never merge past red CI; never merge a
            diff that touches production logic without a human (open the PR and stop instead);
            never commit secrets.
          claude_args: >-
            --max-turns 160
