name: iOS Tests

# DISABLED 2026-06-06 — auto-run on push/PR removed to stop burning macOS cloud
# minutes. The SDK suite crashes consistently in CI (MeeshyUITests
# CanvasBackgroundIntegrationTests: "test runner crashed while preparing to run
# tests: xctest at swift_task_deinitOnExecutorMainActorBackDeploy"), so every run
# failed. Tests are validated locally via `./apps/ios/meeshy.sh test` /
# `xcodebuild -scheme MeeshySDK-Package`. Re-enable by restoring the push/
# pull_request triggers below once the CanvasBackgroundIntegrationTests crash is
# fixed. Kept runnable on demand via the Actions tab (workflow_dispatch).
on:
  workflow_dispatch:

jobs:
  sdk-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.0.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer

      - name: Run SDK tests
        run: |
          rm -rf TestResults.xcresult
          xcodebuild test \
            -scheme MeeshySDK-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -resultBundlePath TestResults.xcresult \
            -quiet
        working-directory: packages/MeeshySDK

      - name: Surface test failures
        if: always()
        working-directory: packages/MeeshySDK
        run: |
          BUNDLE=TestResults.xcresult
          [ -d "$BUNDLE" ] || { echo "No result bundle produced."; exit 0; }
          echo "::group::Test failure summary"
          xcrun xcresulttool get test-results summary --path "$BUNDLE" 2>/dev/null \
            || xcrun xcresulttool get --legacy --format json --path "$BUNDLE" 2>/dev/null | head -c 60000 \
            || echo "xcresulttool could not read the bundle."
          echo "::endgroup::"

  ios-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.0.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer

      - name: Run iOS tests
        run: |
          rm -rf TestResults.xcresult
          xcodebuild test \
            -project apps/ios/Meeshy.xcodeproj \
            -scheme Meeshy \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:MeeshyTests \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Surface test failures
        if: always()
        run: |
          BUNDLE=TestResults.xcresult
          [ -d "$BUNDLE" ] || { echo "No result bundle produced."; exit 0; }
          echo "::group::Test failure summary"
          xcrun xcresulttool get test-results summary --path "$BUNDLE" 2>/dev/null \
            || xcrun xcresulttool get --legacy --format json --path "$BUNDLE" 2>/dev/null | head -c 60000 \
            || echo "xcresulttool could not read the bundle."
          echo "::endgroup::"
