name: iOS Tests

# Re-enabled 2026-06-07. Runs the app's MeeshyTests suite. The MeeshySDK package
# suite lives in a separate workflow (sdk-tests.yml) gated only on
# packages/MeeshySDK/**, so an app-only PR is not blocked by it. This workflow
# still triggers on packages/MeeshySDK/** because the app depends on the SDK and
# we want app-level coverage of SDK changes.
#
# Two environment facts drive the toolchain configuration below:
#   1. The "test runner crashed … at swift_task_deinitOnExecutorMainActorBackDeploy"
#      failure is a bug in the iOS 26.x SIMULATOR runtime's isolated-deinit path
#      (double-free of a TaskLocal scope at xctest teardown for @MainActor classes
#      with isolated deinits). It is ABSENT on the iOS 18.x runtime.
#   2. The Timeline snapshot baselines were recorded on iOS 18.2.
# So we COMPILE with Xcode 26.1.1 (Swift 6.2, required by the package) but RUN the
# tests on an iOS 18.x simulator: crash-free AND consistent with the baselines.
# Product code also received `nonisolated deinit` hardening for the affected
# classes. workflow_dispatch kept for on-demand runs from the Actions tab.
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  workflow_dispatch:

# A hung xctest must never sit for GitHub's 6h default. A new push on the same
# ref cancels stale in-progress runs so we never accumulate multi-hour zombies.
concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tests:
    runs-on: macos-15
    # Hard cap: the suite normally finishes in <15 min (incl. the one-time 18.2
    # runtime download). 25 min fails fast if a test deadlocks instead of hanging.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.1.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer

      # XcodeGen owns project generation (see commit dropping hand-edited
      # pbxproj entries). The committed Meeshy.xcodeproj/project.pbxproj is a
      # generated artifact and can lag behind newly-added sources; regenerate
      # it from project.yml so every file on disk is compiled (otherwise a new
      # file like a Bubble subview fails with "cannot find … in scope").
      - name: Generate Xcode project (XcodeGen)
        run: |
          brew install xcodegen
          cd apps/ios
          xcodegen generate

      - name: Provision iOS 18.2 simulator
        id: sim
        run: |
          set -e
          # iOS 18.5/18.6 (the runner's pre-installed 18.x) AND iOS 26.x all hit a
          # Swift runtime isolated-deinit crash at xctest teardown
          # (swift_task_deinitOnExecutorMainActorBackDeploy → double-free). Only
          # iOS 18.0–18.2 are crash-free, and the Timeline snapshot baselines were
          # recorded on 18.2. Download 18.2 on demand if the runner lacks it
          # (≈5 min, first run only per runner).
          if ! xcrun simctl list runtimes | grep -q "iOS 18.2"; then
            echo "Downloading iOS 18.2 simulator runtime…"
            xcodebuild -downloadPlatform iOS -buildVersion 18.2
          fi
          SIM_ID=$(xcrun simctl create "iPhone16Pro-iOS182-CI" "iPhone 16 Pro" "com.apple.CoreSimulator.SimRuntime.iOS-18-2")
          echo "sim_id=$SIM_ID" >> "$GITHUB_OUTPUT"
          # Boot the simulator and pre-grant the photos-add TCC permission so
          # CameraCaptureSaveRuntimeTests (the "film + validate" SIGTRAP guard,
          # see apps/ios/MeeshyTests/Unit/Components/CameraCaptureSaveRuntimeTests.swift)
          # actually exercises PhotoLibraryManager.saveVideo/saveImage instead of
          # always hitting its skipIfUnauthorized() XCTSkip. A freshly `simctl
          # create`d device has no grants, so without this the guard silently
          # never runs in CI.
          xcrun simctl boot "$SIM_ID"
          xcrun simctl privacy "$SIM_ID" grant photos-add me.meeshy.app

      # Pre-resolve the SPM graph with retries. Firebase/grpc ship binary-target
      # zips fetched from dl.google.com, which intermittently fail mid-download
      # on the runner ("The network connection was lost." → exit 74) and took the
      # whole job down before a single test compiled. Resolving up front (into the
      # same default DerivedData the test step reuses) lets us retry the transient
      # network failure instead of losing the run; a real resolution error still
      # fails after the attempts are exhausted.
      - name: Resolve SPM packages (retry on transient network)
        run: |
          for attempt in 1 2 3 4; do
            if xcodebuild -resolvePackageDependencies \
                 -project apps/ios/Meeshy.xcodeproj -scheme Meeshy; then
              echo "SPM resolve OK (attempt $attempt)"
              exit 0
            fi
            echo "::warning::SPM resolve attempt $attempt failed (transient network?), retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::SPM resolve failed after 4 attempts"
          exit 1

      - name: Run iOS tests
        run: |
          rm -rf TestResults.xcresult
          # The 3 XCTMetric benchmark suites (MessageListPerformanceTests,
          # BubbleSimpleMessagePerfTests, SearchPerformanceTests) are
          # intentionally gated OUT of the regular run — see their file
          # headers and scripts/ios-perf-benchmark.sh, which is the only
          # invocation meant to exercise them (via -only-testing). Gating
          # is invocational, not env-var based (RUN_PERF_BENCHMARKS never
          # reaches the in-simulator test process under `xcodebuild test`),
          # so -skip-testing is the only thing that actually excludes them.
          # meeshy.sh mirrors the same exclusion locally (NON_PHASE_SUITES).
          xcodebuild test \
            -project apps/ios/Meeshy.xcodeproj \
            -scheme Meeshy \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.sim_id }}" \
            -only-testing:MeeshyTests \
            -skip-testing:MeeshyTests/MessageListPerformanceTests \
            -skip-testing:MeeshyTests/BubbleSimpleMessagePerfTests \
            -skip-testing:MeeshyTests/SearchPerformanceTests \
            -resultBundlePath TestResults.xcresult \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 180 \
            -quiet

      - name: Surface test failures
        if: always()
        run: |
          BUNDLE=TestResults.xcresult
          [ -d "$BUNDLE" ] || { echo "No result bundle produced."; exit 0; }
          echo "::group::Test failure summary"
          xcrun xcresulttool get test-results summary --path "$BUNDLE" 2>/dev/null \
            || xcrun xcresulttool get --legacy --format json --path "$BUNDLE" 2>/dev/null | head -c 60000 \
            || echo "xcresulttool could not read the bundle."
          echo "::endgroup::"
