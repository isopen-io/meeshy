name: iOS Tests

# Re-enabled 2026-06-07. Runs the app's MeeshyTests suite. The MeeshySDK package
# suite lives in a separate workflow (sdk-tests.yml) gated only on
# packages/MeeshySDK/**, so an app-only PR is not blocked by it. This workflow
# still triggers on packages/MeeshySDK/** because the app depends on the SDK and
# we want app-level coverage of SDK changes.
#
# Two environment facts drive the toolchain configuration below:
#   1. The "test runner crashed … at swift_task_deinitOnExecutorMainActorBackDeploy"
#      failure is a bug in the iOS 26.x SIMULATOR runtime's isolated-deinit path
#      (double-free of a TaskLocal scope at xctest teardown for @MainActor classes
#      with isolated deinits). It is ABSENT on the iOS 18.x runtime.
#   2. The Timeline snapshot baselines were recorded on iOS 18.2.
# So we COMPILE with Xcode 26.1.1 (Swift 6.2, required by the package) but RUN the
# tests on an iOS 18.x simulator: crash-free AND consistent with the baselines.
# Product code also received `nonisolated deinit` hardening for the affected
# classes. workflow_dispatch kept for on-demand runs from the Actions tab.
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  workflow_dispatch:

# A hung xctest must never sit for GitHub's 6h default. A new push on the same
# ref cancels stale in-progress runs so we never accumulate multi-hour zombies.
concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tests:
    runs-on: macos-15
    # Measured warm-cache breakdown (macos-15, 2-worker parallel run phase):
    # ~1 min setup + ~9-14 min iOS 18.2 runtime download (fixed, variable with
    # network) + ~3-5 min SPM resolve + ~9 min incremental compile + ~7-8 min
    # parallel tests ≈ 31-33 min. 35 gives margin for the runtime-download
    # variance without going to the 40+ min a serial run would have needed.
    # Still a hard cap so a genuine deadlock fails fast, not GitHub's 6h default.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7

      - name: Select Xcode 26.1.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer

      # SPM checkouts + binary-target zips (Firebase/gRPC from dl.google.com,
      # ~6 min cold and flaky). RESTORE-ONLY here; the matching save runs right
      # after resolve — see the "Save SPM cache" step for why the split matters.
      # Kept in its own tree (`$RUNNER_TEMP/spm`, via -clonedSourcePackagesDirPath)
      # so it caches independently of the compiled build products below.
      - name: Restore SPM cache
        id: spm-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/spm
          key: ios-spm-${{ hashFiles('apps/ios/project.yml') }}

      # Compiled modules / build products. RESTORE-ONLY; the save is explicit,
      # after the compile step (see "Save DerivedData build cache"), because the
      # post-job save is skipped on a timeout-cancellation exactly like the SPM
      # one. Rolling key → incremental reuse from the most recent prior run; the
      # toolchain + manifest prefix starts a fresh lineage on a dependency or
      # Xcode bump.
      - name: Restore DerivedData build cache
        id: dd-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ runner.temp }}/DerivedData
          key: ios-dd-macos15-xc26_1_1-${{ hashFiles('apps/ios/project.yml') }}-${{ github.sha }}
          restore-keys: |
            ios-dd-macos15-xc26_1_1-${{ hashFiles('apps/ios/project.yml') }}-
            ios-dd-macos15-xc26_1_1-

      # XcodeGen owns project generation (see commit dropping hand-edited
      # pbxproj entries). The committed Meeshy.xcodeproj/project.pbxproj is a
      # generated artifact and can lag behind newly-added sources; regenerate
      # it from project.yml so every file on disk is compiled (otherwise a new
      # file like a Bubble subview fails with "cannot find … in scope").
      - name: Generate Xcode project (XcodeGen)
        run: |
          brew install xcodegen
          cd apps/ios
          xcodegen generate

      - name: Provision iOS 18.2 simulator
        id: sim
        run: |
          set -e
          # iOS 18.5/18.6 (the runner's pre-installed 18.x) AND iOS 26.x all hit a
          # Swift runtime isolated-deinit crash at xctest teardown
          # (swift_task_deinitOnExecutorMainActorBackDeploy → double-free). Only
          # iOS 18.0–18.2 are crash-free, and the Timeline snapshot baselines were
          # recorded on 18.2. Download 18.2 on demand if the runner lacks it
          # (≈5 min, first run only per runner).
          if ! xcrun simctl list runtimes | grep -q "iOS 18.2"; then
            echo "Downloading iOS 18.2 simulator runtime…"
            xcodebuild -downloadPlatform iOS -buildVersion 18.2
          fi
          SIM_ID=$(xcrun simctl create "iPhone16Pro-iOS182-CI" "iPhone 16 Pro" "com.apple.CoreSimulator.SimRuntime.iOS-18-2")
          echo "sim_id=$SIM_ID" >> "$GITHUB_OUTPUT"
          # Boot the simulator and pre-grant the photos-add TCC permission so
          # CameraCaptureSaveRuntimeTests (the "film + validate" SIGTRAP guard,
          # see apps/ios/MeeshyTests/Unit/Components/CameraCaptureSaveRuntimeTests.swift)
          # actually exercises PhotoLibraryManager.saveVideo/saveImage instead of
          # always hitting its skipIfUnauthorized() XCTSkip. A freshly `simctl
          # create`d device has no grants, so without this the guard silently
          # never runs in CI.
          xcrun simctl boot "$SIM_ID"
          xcrun simctl privacy "$SIM_ID" grant photos-add me.meeshy.app

      # Pre-resolve the SPM graph with retries. Firebase/grpc ship binary-target
      # zips fetched from dl.google.com, which intermittently fail mid-download
      # on the runner ("The network connection was lost." → exit 74) and took the
      # whole job down before a single test compiled. Resolving up front — into
      # the same fixed trees the cache restores and the test step reuses — lets
      # us retry the transient network failure, and a warm cache makes it
      # near-instant; a real resolution error still fails after the attempts.
      - name: Resolve SPM packages (retry on transient network)
        run: |
          for attempt in 1 2 3 4; do
            if xcodebuild -resolvePackageDependencies \
                 -project apps/ios/Meeshy.xcodeproj -scheme Meeshy \
                 -derivedDataPath "$RUNNER_TEMP/DerivedData" \
                 -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm"; then
              echo "SPM resolve OK (attempt $attempt)"
              exit 0
            fi
            echo "::warning::SPM resolve attempt $attempt failed (transient network?), retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::SPM resolve failed after 4 attempts"
          exit 1

      # Seed the SPM cache the INSTANT it resolves — before the compile that may
      # blow the timeout. actions/cache's post-job save is skipped when the job
      # is cancelled, and a timeout IS a cancellation: the first cold run proved
      # a combined cache never seeds because the compile is killed before
      # post-job runs. This explicit save sits right after a resolve that
      # finishes well within budget, so run N banks the ~6-min SPM download even
      # if it later times out compiling — run N+1 then starts warm and is far
      # likelier to finish the build, which in turn seeds the DerivedData cache.
      - name: Save SPM cache
        if: always() && steps.spm-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/spm
          key: ios-spm-${{ hashFiles('apps/ios/project.yml') }}

      # Compile separately from running so DerivedData can be banked the moment
      # the (expensive) build finishes — see "Save DerivedData build cache".
      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project apps/ios/Meeshy.xcodeproj \
            -scheme Meeshy \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.sim_id }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm" \
            -quiet

      # Seed DerivedData the instant the compile succeeds — BEFORE the test run,
      # which can itself be slow. Same rationale as "Save SPM cache": the
      # post-job save is skipped on a timeout-cancellation, so an explicit save
      # here banks the compiled build products even if the run phase later
      # overruns. `success()` guards against caching a broken build. Progressive:
      # once seeded, the next run restores compiled modules and the compile is
      # incremental (minutes, not the ~15+ min cold compile that was overrunning
      # the budget). Skipped when the restore already hit the exact key.
      - name: Save DerivedData build cache
        if: success() && steps.dd-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ runner.temp }}/DerivedData
          key: ios-dd-macos15-xc26_1_1-${{ hashFiles('apps/ios/project.yml') }}-${{ github.sha }}

      - name: Run iOS tests (without building)
        run: |
          rm -rf TestResults.xcresult
          # The 3 XCTMetric benchmark suites (MessageListPerformanceTests,
          # BubbleSimpleMessagePerfTests, SearchPerformanceTests) are
          # intentionally gated OUT of the regular run — see their file
          # headers and scripts/ios-perf-benchmark.sh, which is the only
          # invocation meant to exercise them (via -only-testing). Gating
          # is invocational, not env-var based (RUN_PERF_BENCHMARKS never
          # reaches the in-simulator test process under `xcodebuild test`),
          # so -skip-testing is the only thing that actually excludes them.
          # meeshy.sh mirrors the same exclusion locally (NON_PHASE_SUITES).
          # Parallelize the run phase: it became the bottleneck once caching cut
          # the compile (measured ~13 min serial). xcodebuild CLONES the single
          # destination simulator into `worker-count` copies — all of the SAME
          # iOS 18.2 runtime — so the Timeline snapshot baselines still match and
          # the isolated-deinit crash (18.5/18.6/26.x only) stays avoided. Test
          # CLASSES are distributed across the clones, each in its own sim + test
          # host process (isolation is per-process, so cross-suite singleton
          # bleed can't span workers). Worker count is pinned to 2: the standard
          # macos-15 runner is 3 vCPU / 7 GB, and each booted clone + host eats
          # ~1.5-2 GB, so 2 is the memory-safe sweet spot; the clone boots add a
          # ~1 min fixed cost, still a net win over serial.
          # NOTE: the photos-add TCC grant is applied to the source device above;
          # `simctl clone` copies the data container (incl. TCC.db), so
          # CameraCaptureSaveRuntimeTests keeps its grant on the clones.
          xcodebuild test-without-building \
            -project apps/ios/Meeshy.xcodeproj \
            -scheme Meeshy \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.sim_id }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -clonedSourcePackagesDirPath "$RUNNER_TEMP/spm" \
            -only-testing:MeeshyTests \
            -skip-testing:MeeshyTests/MessageListPerformanceTests \
            -skip-testing:MeeshyTests/BubbleSimpleMessagePerfTests \
            -skip-testing:MeeshyTests/SearchPerformanceTests \
            -parallel-testing-enabled YES \
            -parallel-testing-worker-count 2 \
            -resultBundlePath TestResults.xcresult \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 180 \
            -quiet

      - name: Surface test failures
        if: always()
        run: |
          BUNDLE=TestResults.xcresult
          [ -d "$BUNDLE" ] || { echo "No result bundle produced."; exit 0; }
          echo "::group::Test failure summary"
          xcrun xcresulttool get test-results summary --path "$BUNDLE" 2>/dev/null \
            || xcrun xcresulttool get --legacy --format json --path "$BUNDLE" 2>/dev/null | head -c 60000 \
            || echo "xcresulttool could not read the bundle."
          echo "::endgroup::"
