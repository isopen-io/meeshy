name: iOS Tests

# Re-enabled 2026-06-07 — the "test runner crashed while preparing to run tests:
# xctest at swift_task_deinitOnExecutorMainActorBackDeploy" failure (which hit
# both the SDK and app suites at bundle bootstrap) was an isolated-deinit
# back-deployment bug in the Xcode 26.0.1 toolchain, not a product defect. Pinning
# the runner to Xcode 26.1.1 (17B100 — the exact build that passes locally) fixes
# it. workflow_dispatch kept for on-demand runs from the Actions tab.
on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  workflow_dispatch:

jobs:
  sdk-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.1.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer

      - name: Run SDK tests
        run: |
          rm -rf TestResults.xcresult
          xcodebuild test \
            -scheme MeeshySDK-Package \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -resultBundlePath TestResults.xcresult \
            -quiet
        working-directory: packages/MeeshySDK

      - name: Surface test failures
        if: always()
        working-directory: packages/MeeshySDK
        run: |
          BUNDLE=TestResults.xcresult
          [ -d "$BUNDLE" ] || { echo "No result bundle produced."; exit 0; }
          echo "::group::Test failure summary"
          xcrun xcresulttool get test-results summary --path "$BUNDLE" 2>/dev/null \
            || xcrun xcresulttool get --legacy --format json --path "$BUNDLE" 2>/dev/null | head -c 60000 \
            || echo "xcresulttool could not read the bundle."
          echo "::endgroup::"

  ios-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.1.1 (Swift 6.2)
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || sudo xcode-select -s /Applications/Xcode_26.1.app/Contents/Developer

      - name: Run iOS tests
        run: |
          rm -rf TestResults.xcresult
          xcodebuild test \
            -project apps/ios/Meeshy.xcodeproj \
            -scheme Meeshy \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:MeeshyTests \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Surface test failures
        if: always()
        run: |
          BUNDLE=TestResults.xcresult
          [ -d "$BUNDLE" ] || { echo "No result bundle produced."; exit 0; }
          echo "::group::Test failure summary"
          xcrun xcresulttool get test-results summary --path "$BUNDLE" 2>/dev/null \
            || xcrun xcresulttool get --legacy --format json --path "$BUNDLE" 2>/dev/null | head -c 60000 \
            || echo "xcresulttool could not read the bundle."
          echo "::endgroup::"
