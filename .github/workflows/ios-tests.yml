name: iOS Tests

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/MeeshySDK/**'
      - '.github/workflows/ios-tests.yml'

jobs:
  sdk-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Run SDK tests
        run: |
          DESTINATION=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | sed -E 's/.* \(([-0-9A-F]+)\) .*/id=\1/')
          if [ -z "$DESTINATION" ]; then DESTINATION="name=iPhone 16 Pro"; fi
          xcodebuild test \
            -scheme MeeshySDK-Package \
            -destination "platform=iOS Simulator,$DESTINATION" \
            -quiet
        working-directory: packages/MeeshySDK

  ios-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Run iOS tests
        run: |
          DESTINATION=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | sed -E 's/.* \(([-0-9A-F]+)\) .*/id=\1/')
          if [ -z "$DESTINATION" ]; then DESTINATION="name=iPhone 16 Pro"; fi
          xcrun simctl boot "${DESTINATION#id=}" 2>/dev/null || true
          xcodebuild test \
            -project apps/ios/Meeshy.xcodeproj \
            -scheme Meeshy \
            -destination "platform=iOS Simulator,$DESTINATION" \
            -only-testing:MeeshyTests \
            -quiet
