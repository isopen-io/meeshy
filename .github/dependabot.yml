# =============================================================================
# DEPENDABOT CONFIGURATION - Mises à jour automatiques des dépendances
# =============================================================================
# Documentation: https://docs.github.com/en/code-security/dependabot
#
# Dependabot crée automatiquement des PRs pour :
# - Mises à jour de sécurité (vulnérabilités)
# - Mises à jour de versions (selon schedule)
#
# Configuration adaptée au monorepo Meeshy avec pnpm
# =============================================================================

version: 2

updates:
  # ===========================================================================
  # NPM/PNPM - Applications et Services
  # ===========================================================================

  # Application Web (Next.js)
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "web"
      - "security"
    commit-message:
      prefix: "chore(deps-web)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"
    assignees:
      - "isopen-io/meeshy-maintainers"
    # Grouper les mises à jour mineures/patch ensemble
    groups:
      next-ecosystem:
        patterns:
          - "next*"
          - "@next/*"
          - "react*"
          - "react-dom"
      testing:
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "@types/jest"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Priorité aux mises à jour de sécurité
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    versioning-strategy: increase
    # next 16 casse Turbopack contre @meeshy/shared transpilé (cf. PR #1542, #1676) —
    # bloquer les majeures tant que la migration n'est pas vetée manuellement
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # Service Gateway (Node.js/gRPC)
  - package-ecosystem: "npm"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gateway"
      - "security"
    commit-message:
      prefix: "chore(deps-gateway)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"
    groups:
      grpc-ecosystem:
        patterns:
          - "*grpc*"
          - "@grpc/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    versioning-strategy: increase
    ignore:
      # Prisma v7 désactivé jusqu'à la prise en compte de MongoDB
      # (Prisma 7 retire `datasource url` du schema → P1012 ; migration vers prisma.config.ts + adapter requise)
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]

  # Service Translator (Python/AI)
  - package-ecosystem: "pip"
    directory: "/services/translator"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "translator"
      - "security"
    commit-message:
      prefix: "chore(deps-translator)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"
    groups:
      torch-ecosystem:
        patterns:
          - "torch*"
          - "torchaudio"
      transformers:
        patterns:
          - "transformers"
          - "accelerate"
          - "safetensors"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # espnet 202509+/202511 exigent numpy>=2.0, incompatible avec le pin
      # numpy<1.24.0 (ESPnet 202412 + chatterbox-tts). Un bump casse le build
      # Docker translator (cf. #1539 → CI Docker #2074). Rester sur 202412.
      - dependency-name: "espnet"
      - dependency-name: "espnet-model-zoo"
      # pyannote-audio>=4.0 → pyannote-core>=6.0.1 → numpy>=2.0 + torch>=2.8.0,
      # incompatibles avec numpy<1.24.0 et torch==2.6.0 (Dockerfile). Le bump
      # Dependabot #1674 (3.4.0→4.0.7) a cassé le build Docker translator
      # ("requirements are unsatisfiable"). Rester sur 3.4.0.
      - dependency-name: "pyannote-audio"

  # Package Shared (Prisma/Types)
  - package-ecosystem: "npm"
    directory: "/packages/shared"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "shared"
      - "security"
    commit-message:
      prefix: "chore(deps-shared)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      types:
        patterns:
          - "@types/*"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    versioning-strategy: increase
    ignore:
      # Prisma v7 désactivé jusqu'à la prise en compte de MongoDB
      # (Prisma 7 retire `datasource url` du schema → P1012 ; migration vers prisma.config.ts + adapter requise)
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]

  # Racine du monorepo (turbo, outils globaux)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "monorepo"
      - "security"
    commit-message:
      prefix: "chore(deps-root)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"
    groups:
      build-tools:
        patterns:
          - "turbo*"
          - "typescript"
          - "eslint*"
          - "prettier"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    versioning-strategy: increase

  # ===========================================================================
  # GITHUB ACTIONS - Workflows CI/CD
  # ===========================================================================

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci-cd"
      - "security"
    commit-message:
      prefix: "chore(deps-ci)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"
    groups:
      docker-actions:
        patterns:
          - "docker/*"
      testing-actions:
        patterns:
          - "*test*"
          - "*coverage*"

  # ===========================================================================
  # DOCKER - Images de base
  # ===========================================================================

  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(deps-docker-web)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"

  - package-ecosystem: "docker"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(deps-docker-gateway)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"

  - package-ecosystem: "docker"
    directory: "/services/translator"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
      - "security"
    commit-message:
      prefix: "chore(deps-docker-translator)"
      include: "scope"
    reviewers:
      - "isopen-io/meeshy-maintainers"

# =============================================================================
# CONFIGURATION NOTES
# =============================================================================
#
# - Mises à jour de sécurité : automatiques et immédiates
# - Mises à jour de versions : hebdomadaires (lundi 09:00 CET)
# - Groupement : dépendances liées regroupées dans une seule PR
# - Limite de PRs ouvertes : 3-5 par écosystème pour éviter le spam
# - Labels automatiques : facilite le triage et l'automatisation
# - Reviewers : assignés automatiquement à l'équipe maintainers
#
# Pour désactiver temporairement :
# - Ajouter un label "dependencies-ignore" à une PR
# - Ou modifier schedule.interval à "monthly" pour ralentir
#
# Pour les mises à jour manuelles urgentes :
# - Utiliser `pnpm update <package>@latest`
# - Ou attendre la PR Dependabot hebdomadaire
# =============================================================================
